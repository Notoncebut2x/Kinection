name = "kinection-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"

[[r2_buckets]]
binding = "R2"
bucket_name = "kinection"

[[d1_databases]]
binding = "DB"
database_name = "kinection"
database_id = "REPLACE_WITH_D1_ID"

[[queues.producers]]
binding = "ANALYSIS_QUEUE"
queue = "analysis-jobs"

[[queues.consumers]]
queue = "analysis-jobs"
max_batch_size = 1
max_retries = 3
dead_letter_queue = "analysis-jobs-dlq"

[[kv_namespaces]]
binding = "MARKER_CACHE"
id = "REPLACE_WITH_KV_ID"

[vars]
COMPUTE_SERVICE_URL = ""
COMPUTE_API_KEY = ""

[[migrations]]
tag = "v1"
new_classes = []
