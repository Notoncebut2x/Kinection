name = "kinection-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
workers_dev = true
preview_urls = false

[[r2_buckets]]
binding = "R2"
bucket_name = "kinection"

[[d1_databases]]
binding = "DB"
database_name = "kinection"
database_id = "e163132e-cdce-4208-baba-8596331243dd"

[[kv_namespaces]]
binding = "MARKER_CACHE"
id = "ce7a59f47d0d48a189db114e518f9ce8"

[vars]
# COMPUTE_API_KEY is set via: wrangler secret put COMPUTE_API_KEY
